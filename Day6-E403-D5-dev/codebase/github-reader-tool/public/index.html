<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Document Reader</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 16px;
      font-weight: bold;
    }

    input,
    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1e40af;
    }

    button:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .meta {
      margin-top: 16px;
      color: #374151;
      font-size: 14px;
    }

    .file {
      margin-top: 18px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      overflow: hidden;
    }

    .file-header {
      background: #f9fafb;
      border-bottom: 1px solid #d1d5db;
      padding: 10px 12px;
      font-weight: bold;
      color: #111827;
      word-break: break-word;
    }

    .file-links {
      padding: 14px 16px;
      background: #111827;
      color: #d1d5db;
    }

    .file-links a {
      color: #93c5fd;
      margin-right: 14px;
    }

    pre {
      margin: 0;
      background: #111827;
      color: #d1d5db;
      padding: 16px;
      white-space: pre-wrap;
      overflow-x: auto;
    }

    .error {
      margin-top: 20px;
      background: #111827;
      color: white;
      padding: 16px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>GitHub Document Reader</h1>

    <label for="githubUrl">GitHub Repo URL</label>
    <input
      id="githubUrl"
      value="https://github.com/Vuanh4569/Day6-E403-D5"
      placeholder="https://github.com/owner/repo"
    />

    <label for="githubToken">GitHub Token optional</label>
    <input
      id="githubToken"
      type="password"
      placeholder="Chi can nhap khi bi GitHub API rate limit"
    />

    <button id="readButton" onclick="readGithubFiles()">Read Document Files</button>

    <div class="meta" id="meta"></div>
    <div id="result" class="error">Nhap link repo GitHub roi bam Read Document Files.</div>
  </div>

  <script>
    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function formatSize(size) {
      if (size < 1024) return `${size} bytes`;
      return `${(size / 1024).toFixed(1)} KB`;
    }

    function renderFiles(files) {
      if (!files.length) {
        return '<div class="error">Repo hop le nhung khong tim thay file tai lieu nhu md, txt, pdf, docx.</div>';
      }

      return files
        .map((file) => {
          const header = `${escapeHtml(file.path)} (${formatSize(file.size)})`;
          const localPath = file.localPath
            ? `<div>Saved: ${escapeHtml(file.localPath)}</div>`
            : "";

          if (file.type === "binary") {
            return `
              <div class="file">
                <div class="file-header">${header}</div>
                <div class="file-links">
                  Binary document: ${escapeHtml(file.extension)}
                  ${localPath}
                  <br />
                  <a href="${file.htmlUrl}" target="_blank" rel="noreferrer">Open on GitHub</a>
                  <a href="${file.rawUrl}" target="_blank" rel="noreferrer">Open raw/download</a>
                </div>
              </div>
            `;
          }

          return `
            <div class="file">
              <div class="file-header">${header}</div>
              <div class="file-links">${localPath}</div>
              <pre>${escapeHtml(file.content || "")}</pre>
            </div>
          `;
        })
        .join("");
    }

    async function readGithubFiles() {
      const githubUrl = document.getElementById("githubUrl").value.trim();
      const githubToken = document.getElementById("githubToken").value.trim();
      const meta = document.getElementById("meta");
      const result = document.getElementById("result");
      const button = document.getElementById("readButton");

      if (!githubUrl) {
        result.className = "error";
        result.innerText = "Vui long nhap GitHub Repo URL.";
        return;
      }

      meta.innerText = "";
      result.className = "error";
      result.innerText = "Dang doc cac file tai lieu trong repo GitHub...";
      button.disabled = true;

      try {
        const response = await fetch("/api/read-github", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            githubUrl,
            githubToken
          })
        });

        const data = await response.json();

        if (!data.success) {
          result.className = "error";
          result.innerText = data.error;
          return;
        }

        meta.innerText =
          `Repo: ${data.repo} | Files read: ${data.fileCount}\n` +
          `Saved folder: ${data.savedDir}\n` +
          `Agent knowledge file: ${data.knowledgePath}`;
        result.className = "";
        result.innerHTML = renderFiles(data.files || []);
      } catch (error) {
        result.className = "error";
        result.innerText = `Khong goi duoc server: ${error.message}`;
      } finally {
        button.disabled = false;
      }
    }
  </script>

</body>
</html>
