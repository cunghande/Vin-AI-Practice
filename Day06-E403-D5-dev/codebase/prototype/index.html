<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Learning OS Agent - AI Learning Companion</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card" id="chatCard" aria-label="Learning OS Agent chat">
        
        <!-- Sidebar Drawer -->
        <aside class="drawer" id="drawer" aria-label="Lịch sử trò chuyện">
          <div class="drawer-header">
            <div class="drawer-brand">
              <div class="brand-logo" aria-hidden="true">
                <img src="avatar.png" alt="Learning OS" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
              </div>
              <div>
                <strong>Learning OS</strong>
                <span>Lịch sử trò chuyện</span>
              </div>
            </div>
            <button class="drawer-close" id="closeDrawer" type="button" aria-label="Đóng menu">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>

          <button class="new-chat-button" id="newChatButton" type="button">
            <span class="icon-wrap">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </span>
            Đoạn chat mới
          </button>

          <div class="history-title">Gần đây</div>
          <nav class="history-list" id="historyList" aria-label="Danh sách đoạn chat"></nav>
        </aside>
        
        <!-- Backdrop for mobile drawer -->
        <button class="drawer-backdrop" id="drawerBackdrop" type="button" aria-label="Đóng menu"></button>

        <!-- Chat Header -->
        <header class="chat-header">
          <button class="icon-button menu-button" id="menuButton" type="button" aria-label="Mở menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          </button>

          <div class="agent-title">
            <div class="agent-mark" aria-hidden="true">
              <img src="avatar.png" alt="Learning OS Agent" style="width: 100%; height: 100%; object-fit: cover; border-radius: inherit;" />
            </div>
            <div>
              <h1>Learning OS Agent</h1>
              <p>AI learning companion</p>
            </div>
          </div>

          <div class="header-actions">
            <!-- Theme Toggle Button -->
            <button class="icon-button theme-toggle" id="themeToggle" type="button" aria-label="Chuyển đổi chế độ sáng tối">
              <span class="sun-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
              </span>
              <span class="moon-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              </span>
            </button>
            
            <button class="new-inline-button" id="headerNewChatButton" type="button">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              <span>Chat mới</span>
            </button>
          </div>
        </header>

        <!-- Message List Container -->
        <section class="messages" id="messages" aria-live="polite"></section>

        <!-- Quick Prompt Suggestions -->
        <section class="quick-prompts" id="quickPrompts" aria-label="Gợi ý câu hỏi">
          <button type="button" data-prompt="Build slice nghĩa là gì?">
            <span class="prompt-icon">💡</span>
            <span class="prompt-text">Build slice nghĩa là gì?</span>
          </button>
          <button type="button" data-prompt="Thin spec cần viết những gì?">
            <span class="prompt-icon">📝</span>
            <span class="prompt-text">Thin spec cần viết những gì?</span>
          </button>
          <button type="button" data-prompt="Bài này làm sao để bắt đầu?">
            <span class="prompt-icon">🚀</span>
            <span class="prompt-text">Cách bắt đầu bài học</span>
          </button>
        </section>

        <!-- Message Composer Form -->
        <form class="composer" id="chatForm">
          <input id="fileInput" type="file" multiple hidden />

          <button class="attach-button" id="attachButton" type="button" aria-label="Đính kèm tệp">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>

          <div class="input-wrap">
            <div class="file-list" id="fileList" aria-live="polite"></div>
            <textarea
              id="chatInput"
              rows="1"
              placeholder="Hỏi Learning OS Agent..."
              autocomplete="off"
            ></textarea>
          </div>

          <button class="send-button" type="submit" aria-label="Gửi câu hỏi">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
          </button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
